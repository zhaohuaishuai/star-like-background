name: iOS Build & Deploy (Flutter)

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number override (leave empty for auto)"
        required: false
        type: string
  push:
    branches: [main, master]

concurrency:
  group: ios-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.22.3"

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Code Signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 3600 build.keychain

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          PROFILE_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILE_DIR"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/build_profile.mobileprovision"
          echo "Profile file size: $(wc -c < "$PROFILE_DIR/build_profile.mobileprovision") bytes"
          
          # Debug: show profile details
          security cms -D -i "$PROFILE_DIR/build_profile.mobileprovision" -o /tmp/profile.plist 2>/dev/null || true
          if [ -f /tmp/profile.plist ]; then
            UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist 2>/dev/null || echo "unknown")
            NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist 2>/dev/null || echo "unknown")
            TEAM=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.team-identifier" /tmp/profile.plist 2>/dev/null || echo "unknown")
            echo "Profile UUID: $UUID"
            echo "Profile Name: $NAME"
            echo "Team ID: $TEAM"
            # Rename by UUID for consistency
            cp "$PROFILE_DIR/build_profile.mobileprovision" "$PROFILE_DIR/$UUID.mobileprovision" 2>/dev/null || true
          else
            echo "Warning: could not decode provisioning profile"
          fi
          echo "Installed profiles:"
          ls -la "$PROFILE_DIR/" 2>/dev/null || echo "  (empty)"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            flutter-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS IPA (App Store)
        run: |
          BUILD_NUMBER="${{ github.run_number }}"
          if [ -n "${{ inputs.build_number }}" ]; then
            BUILD_NUMBER="${{ inputs.build_number }}"
          fi
          flutter build ipa \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=ios/ExportOptions.plist
          
      - name: Find IPA
        run: |
          echo "=== Build output ==="
          find build -name "*.ipa" -type f 2>/dev/null || echo "No ipa found in build/"
          echo "=== build/ios/ipa ==="
          ls -la build/ios/ipa/ 2>/dev/null || echo "directory not found"
          echo "=== build/ios ==="
          ls -la build/ios/ 2>/dev/null || echo "directory not found"

      - name: Upload to App Store Connect
        run: |
          IPA_PATH=$(find build -name "*.ipa" -type f 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "IPA file not found"
            exit 1
          fi
          echo "Uploading: $IPA_PATH"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey ${{ secrets.APPSTORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }} \
            --verbose

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
